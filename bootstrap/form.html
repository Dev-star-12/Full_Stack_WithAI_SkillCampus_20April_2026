<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <h1 class="text-center text-danger"><i class="bi bi-windows text-info"></i> User Form <i class="bi bi-tiktok text-success"></i></h1>
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <label for="">UserName</label>
          <input type="text" name="" id="" class="form-control" />
        </div>
        <div class="col-md-6">
          <label for="">UserEmail</label>
          <input type="email" name="" id="" class="form-control" />
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <label for="">Language's</label>
          <select name="" id="" class="form-select">
            <option value="">HTML</option>
            <option value="">CSS</option>
            <option value="">C++</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="">Doc's</label>
          <input type="file" name="" id="" class="form-control" />
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name=""
              id=""
            /><label for="">I-Phone</label>
          </div>
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name=""
              id=""
            /><label for="">Samsung</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check">
            <input type="radio" name="tech" id="" class="form-check-input" />
            <label for="">Laptop</label>
          </div>
          <div class="form-check">
            <input type="radio" name="tech" id="" class="form-check-input" />
            <label for="">Mobile</label>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <label for="">Select Filter Range</label>
          <input type="range" name="" id="" class="form-range" />
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input type="email" name="" id="" class="form-control" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              id="floatingInput"
              placeholder="name@example.com"
            />
            <label for="floatingInput">Email address</label>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
