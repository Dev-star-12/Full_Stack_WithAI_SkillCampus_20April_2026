<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0 ;
            padding: 0;
            box-sizing: border-box;
        }
        button{
            background-color: rgb(0, 95, 213);
            border: none;
            color: white;
            padding: 5px 90px;
            border-radius: 20px;
            font-size: 8px;
            font-weight: bold;
            width: 50%;
        }
        input{
            width: 50%;
            border: none;
            border: 1px solid gray;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .box1{
            width: 200px;
            height: 200px;
            border: 5px solid black;
            padding: 20px;
            margin: 30px;
        }
        /* Width = Actual Width + left padding + right padding + left border + right border */
        /* width = 200px + 20px + 20px + 5px + 5px =250px  */
        
        /* Height = Actual Height + top padding + bottom padding + top border + bottom border */
        /* height = 200px + 20px + 20px + 5px + 5px = 250px */

        .box2{
            box-sizing: border-box; 
            width: 300px;
            height: 200px;
            border: 5px solid green;
            padding: 30px 20px 10px 20px;
            margin-top: -50px;
        }

        .box3{
            width: 300px;
            height: 100px;
            border: 4px solid brown;
            margin: auto;
        }

        /* 
        height = ? 200px +  30Px + 10Px + 5px + 5px = 250px
        Width = ?  300px +  20px +  20px + 5px + 5px =  350px    
        */

        span{
            border: 5px solid palevioletred;
            width: 500px;
            height: 500px;
            margin-bottom: 100px;
        }
    </style>
</head>
<body>
    <h1>Log in to Facebook</h1>
    <input type="text" name="" id=""
    placeholder="Email address or mobile number"
    >
    <br>
    <button>Login</button>

    <div class="box1">Box1</div>
    <div class="box2">box2</div>
    <div class="box3">Box3</div>

    <span>Hello class</span>

</body>
</html>
