<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 100%;
            height: 300px;
     
            /* background: linear-gradient(red,blue,pink); */

            background: linear-gradient( 90deg , red 50%, blue 20% , pink 30%);
        }
        .box2{
            width: 200px;
            height: 200px;
            border: 2px solid black;
            margin-top: 20px;
            background: radial-gradient(red,blue,yellow);
        }
        .box3{
            width: 200px;
            height: 200px;
            border: 3px solid green;
            margin-top: 20px;
            background: conic-gradient(red,blue,yellow);
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
