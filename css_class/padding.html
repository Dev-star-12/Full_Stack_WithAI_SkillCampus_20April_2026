<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding</title>

    <style>
        .box1{
            background-color: palevioletred;
            border: 5px solid black;
            width: 200px;
            height: 200px;
            color: white;
            padding-top: 20px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            margin-bottom: 50px;
        }
        .box2{
            background-color: skyblue;
            border: 5px gray solid;
            width: 200px;
            height: 200px;
            padding: 20px 50px 20px 50px;
            margin-top: 80px;
        }
    </style>

</head>
<body>
    <div class="box1">
        SkillCampus 🦧 (Box-1)
    </div>
    <div class="box2">
        SkillCampus 🍊(Box-2)
    </div>
</body>
</html>
