<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;

        }
        .container{
            width: 100%;
            max-width: 1200px;
            display: grid;
            gap: 30px;
            grid-template-columns: repeat(4,1fr);
        }
        .card{
            background-color: rgba(181, 181, 181, 0.564);
            text-align: center;
            padding: 45px 15px;
              transition: transform 0.3s linear;
            cursor: pointer;
        }
        .card img{
            width: 140px;
            height: 140px;
            border-radius: 100%;
            object-fit: cover;
            border: 4px solid rgba(112, 74, 87, 0.467);
            margin-bottom: 25px;
          
        }
        .card:hover{
            transform: translateY(-10px);
        }
        .card h2{
            font-size: 42px;
            color: rgba(31, 30, 30, 0.851);
            margin-bottom: 10px;
            font-weight: bold;
        }
        @media (max-width:992px){
            .container{
                grid-template-columns: repeat(2,1fr);
            }
        }
        @media (max-width:578px){
            .container{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIb1Rzl1hRfAv4mVFgDajXGAByt2Jhq8ECIQ&s" alt="">
            <h2>Manny</h2>
            <p>Web Developer</p>
        </div>
        <div class="card">
            <img src="https://t4.ftcdn.net/jpg/03/83/25/83/360_F_383258331_D8imaEMl8Q3lf7EKU2Pi78Cn0R7KkW9o.jpg" alt="">
            <h2>Kizie</h2>
            <p>Digital Marketer</p>
        </div>
        <div class="card">
            <img src="https://media.istockphoto.com/id/2172317014/photo/happy-hispanic-man-working-on-laptop-at-home.jpg?s=612x612&w=0&k=20&c=9evc002hmjsuha6TiO8OftVTuZIE71Hr3qhmq8vRRH0=" alt="">
            <h2>Aman</h2>
            <p>Designer</p>
        </div>
        <div class="card">
            <img src="https://img.magnific.com/free-photo/young-bearded-man-with-striped-shirt_273609-5677.jpg" alt="">
            <h2>Rahul</h2>
            <p>Web Developer</p>
        </div>
    </div>
</body>
</html>
