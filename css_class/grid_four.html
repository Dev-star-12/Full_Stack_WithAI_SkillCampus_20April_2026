            display: grid;
            grid-template-columns: 2fr 3fr 4fr;
            grid-template-rows: 1fr 1fr 1fr 2fr 1fr;
            gap: 10px;
        }

        .container > div{
            border: 3px solid red;
            padding: 15px;
        }

        .box1{
            justify-self: center;
            align-self: center;
        }

        .box2{

        }

        .box4{

</head>
<body>
