<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url("https://cdn.pixabay.com/photo/2025/09/19/05/48/mountain-range-9842371_1280.jpg");
            min-height: 200vh;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .navbar{
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background-color: rgba(2, 2, 2, 0.494);
            border: 1px solid rgba(255, 255, 255, 0.241);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px;
            padding: 18px 40px;
            color: white;
            backdrop-filter: blur(12px);
        }
        .navbar ul{
            display: flex;
            gap: 30px;
            list-style-type: none;
        }
        .navbar ul li:hover{
            color: rgb(248, 174, 2);
            cursor: pointer;
        }
        .hero{
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgb(233, 233, 233);
            font-size: 3rem;
            text-align: center;
        }

        .btn{
            position: relative;
            border: 2px solid black;
            padding: 20px 60px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            box-shadow: 0 0 20px rgb(46, 131, 150);
            transition: 0.5s;
            overflow: hidden;
            
        }
        .btn:hover{
            transform: scale(1.08);
            box-shadow: 0 0 20px cyan;
        }

        .btn::before{
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: rgb(0, 154, 154);
            font-weight: bold;
            transition: 0.5s;
            z-index: -1;
        }

        .btn:hover::before{
            left: 0;
        }


    </style>
</head>
<body>
    <nav class="navbar">
        <h2>SkillCampus</h2>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <section class="hero">
        <h1>Wow..! What a class 😍</h1>
        <a href="" class="btn">Hover Me</a>
    </section>

    <section class="content"></section>

</body>
</html>
