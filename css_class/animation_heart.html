<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
           *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        .heart{
            position: relative;
            width: 100px;
            height: 100px;
            background-color: red;
            transform: rotate(-45deg);
            animation: beat 0.5s infinite;
        }

        .heart::before,
        .heart::after{
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 50%;
        }

        .heart::before{
            top: -50px;
            left: 0;
        }

        .heart::after{
            left: 50px;
            top: 0;
        }

        @keyframes beat{
            0%{
                transform: rotate(-45deg) scale(1);
            }
            50%{
                transform: rotate(-45deg) scale(1.5);
            }
            100%{
                transform: rotate(-45deg) scale(1);
            }
        }

    </style>
</head>
<body>
        <div class="heart"></div>
</body>
</html>
