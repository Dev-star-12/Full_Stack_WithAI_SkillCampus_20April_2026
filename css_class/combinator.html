<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box1 h3{
            color: green;
        }

        .box2 > p{
            color: blue;
        }
    </style>

</head>
<body>
    

    <div class="box1">
        <p>hello</p>
        <p>hy</p>
        <h3>Hello Guys</h3>
        <p>by</p>
    </div>

    <div class="box2">
        <p>Direct Child</p>
        <section>
            <p>Not Direct Child</p>
        </section>
    </div>

</body>
</html>
