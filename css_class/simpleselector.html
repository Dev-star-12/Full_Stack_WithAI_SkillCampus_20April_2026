<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* tagname */
        /* ctrl+/ */
        h1{
            color: red;
            text-align: center;
        }
        /* id */
        #p1{
            color: green;
        }
        /* class */
        .clr{
            color: brown;
        }
    </style>

</head>
<body>
    <!-- Comment -->
    <h1>Hello class 😍</h1>
    <p id="p1">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quaerat sed vero omnis provident recusandae temporibus eos, suscipit quis qui ipsa.</p>
    <p class="clr">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Porro, impedit.</p>
    <h2 >SkillCampus</h2>
    <h3 class="clr">Hello guys how are you.!</h3>
</body>
</html>
