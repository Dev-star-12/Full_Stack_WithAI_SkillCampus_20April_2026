<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      div {
        border: 5px solid black;
        padding: 10px;
        margin: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1 id="ha">Hahahahahahaha</h1>
    <button onclick="clicks()">Change</button>

    <div onmouseenter="mouse()" id="box" onmouseleave="exit()">
      <h2>Counter 🔄️</h2>
      <button onclick="increment()">Increment ➕</button>
      <h2 id="value">0</h2>
      <button onclick="decrement()">Decrement ➖</button>
    </div>

    <button ondblclick="dbClick()">Double Click</button>

    <select name="" id="car" onchange="change()">
      <option value="select">---Select---</option>
      <option value="Bmw">Bmw</option>
      <option value="Honda">Honda</option>
      <option value="MG">MG</option>
    </select>

 
    <script>
      // let h1 = document.createElement("h1")
      // console.log(h1)
      // h1.innerText = "Hello Dom class"
      // document.body.appendChild(h1)

      // document.getElementById("ha").innerText = '😂🤣😂🤣😂🤣'


     

      function change(){
         let a = document.getElementById("car").value
        document.getElementById("ha").innerText = a
      }

      function mouse(){
        document.getElementById("box").style.borderColor = "red"
      }

      function exit(){
         document.getElementById("box").style.borderColor = "blue"
      }



    function dbClick(){
      document.getElementById("ha").innerText = "wow";
    }


      function clicks() {
        document.getElementById("ha").innerText = "😂🤣😂🤣😂🤣";
      }

      let value = 0;

      document.getElementById("value").innerText = value

      function increment(){
        document.getElementById("value").innerText = value++
      }

      function decrement(){
        if(value>=0){
           document.getElementById("value").innerText = value--
        }
       
      }

    </script>
  </body>
</html>
