<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="" method="post">
        <label for="uname">Username</label>
        <input type="text" name="Fname" id="uname" placeholder="Username" title="Enter your name here" required>
        <br><br>
        <label for="address">Address</label>
        <textarea name="address" id="address" minlength="10" maxlength="20" title="Enter your address here"></textarea>
        <br><br>
        <label for="dob">Dob</label>
        <input type="date" name="dob" id="dob">
        <br><br>
        <label for="">Password</label>
        <input type="password" name="pass" id="" placeholder="Password" required>
        <br><br>
        <label for="">Email</label>
        <input type="email" name="UserEmail" id="">
        <br><br>
        <input type="file" name="doc" id="" multiple>
        <br><br>
        <label for="">Age</label>
        <input type="number" name="userAge" id="" max="10" min="5">
        <br><br>
        <label for="">Search here..</label>
        <input type="search" name="userSearch" id="">
        <br><br>
        <label for="">Select Month</label>
        <input type="month" name="month" id="">
        <br><br>
        <label for="">Time</label>
        <input type="time" name="time" id="">
        <br><br>

        <label for="">Gender</label>
        <input type="radio" name="gender" id="" value="male"><label for="">Male</label>
        <input type="radio" name="gender" id="" value="female"><label for="">Female</label>
        <input type="radio" name="gender" id="" value="other"><label for="">Other</label>
        <br><br>

        <label for="">Color</label>
        <input type="checkbox" name="color" id="" checked value="red"><label for="">Red</label>
        <input type="checkbox" name="color" id="" value="orange"><label for="">Orange</label>
        <input type="checkbox" name="color" id="" value="yellow"><label for="">Yellow</label>
        <input type="checkbox" name="color" id="" value="green"><label for="">Green</label>
        <br><br>

        <label for="">Select Cars</label>
        <select name="cars" id="">
            <option value="bmw">Bmw</option>
            <option value="honda">Honda</option>
            <option value="hyundai">Hyundai</option>
            <option value="mg">MG</option>
        </select>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
</body>
</html>
