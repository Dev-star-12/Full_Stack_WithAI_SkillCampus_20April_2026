<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1 align="center">Calculator</h1>
    <table border="2" align="center">
        <tr>
            <th>
                <input type="text" name="" id="" disabled value="123" placeholder="12345">
            </th>
        </tr>
        <tr align="center">
            <td>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>+</button>
            </td>
        </tr>
        <tr align="center">
            <td>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>-</button>
            </td>
        </tr>
        <tr align="center">
            <td>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>*</button>
            </td>
        </tr>
        <tr align="center">
            <td>
                <button>C</button>
                <button>0</button>
                <button>=</button>
                <button >/</button>
            </td>
        </tr>
    </table>
</body>
</html>
